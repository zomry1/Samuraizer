server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* ^/(analyze|analyze-pdf|analyze-blog|scan-blog|entries|tags|suggest|search|lists|categories|provider|chat|settings|ollama|rss-feeds|yt-channels|logs|embeddings) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
